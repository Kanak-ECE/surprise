# Professional Romantic Letter Experience (HTML)

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Deb ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top, rgba(120,30,30,0.18), transparent 30%),
    linear-gradient(to bottom, #0a0a0a, #151515);

    overflow:hidden;
    color:white;
    font-family:'Cormorant Garamond', serif;
}

.container{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    position:relative;

    padding:20px;

    text-align:center;
}

.hidden{
    display:none;
}

/* floating particles */

.sparkle{
    position:fixed;
    bottom:-20px;
    color:rgba(255,210,210,0.7);
    animation:floatUp linear infinite;
    pointer-events:none;
}

@keyframes floatUp{

    0%{
        transform:translateY(0);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(-110vh);
        opacity:0;
    }
}

/* title */

.main-title{
    font-size:72px;
    font-weight:400;
    margin-bottom:55px;

    letter-spacing:2px;

    animation:softGlow 3s ease-in-out infinite alternate;
}

@keyframes softGlow{

    from{
        text-shadow:0 0 12px rgba(255,255,255,0.1);
    }

    to{
        text-shadow:0 0 24px rgba(255,255,255,0.4);
    }
}

/* envelope */

.envelope-wrap{
    position:relative;
}

.envelope{
    width:460px;
    height:310px;

    position:relative;

    cursor:pointer;

    transition:0.5s;

    filter:drop-shadow(0 20px 35px rgba(0,0,0,0.5));
}

.envelope:hover{
    transform:translateY(-8px) scale(1.01);
}

/* envelope body */

.envelope-base{
    position:absolute;
    inset:0;

    background:
    linear-gradient(to bottom, #fffdf9, #ece7de);

    border-radius:10px;

    overflow:hidden;
}

/* lower folds */

.fold-left,
.fold-right{
    position:absolute;
    bottom:0;
    width:50%;
    height:100%;
}

.fold-left{
    left:0;

    clip-path:polygon(0 100%, 100% 100%, 100% 0);

    background:linear-gradient(to right, #f5f0e8, #ddd5ca);
}

.fold-right{
    right:0;

    clip-path:polygon(0 0, 0 100%, 100% 100%);

    background:linear-gradient(to left, #f5f0e8, #ddd5ca);
}

/* top flap */

.top-flap{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:100%;

    clip-path:polygon(0 0, 50% 58%, 100% 0);

    background:
    linear-gradient(to bottom, #8d4a3c, #6b3429);

    z-index:3;
}

/* paper texture */

.paper-noise{
    position:absolute;
    inset:0;

    opacity:0.16;

    background-image:
    radial-gradient(rgba(0,0,0,0.6) 0.6px, transparent 0.6px);

    background-size:10px 10px;
}

/* wax seal */

.seal{
    position:absolute;
    top:145px;
    left:50%;

    transform:translateX(-50%);

    width:78px;
    height:78px;

    border-radius:50%;

    background:
    radial-gradient(circle at top, #fff, #ece5dc);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:5;

    box-shadow:
    0 10px 20px rgba(0,0,0,0.22),
    inset 0 3px 8px rgba(255,255,255,0.9);
}

.seal span{
    font-size:34px;
    color:#8d4a3c;
}

.tap-text{
    margin-top:35px;
    font-size:24px;
    letter-spacing:1px;
    color:#d7d0ca;
}

/* rolled letter */

.scroll{
    width:520px;
    height:150px;

    position:relative;

    border-radius:80px;

    background:
    linear-gradient(to bottom, #d4af88, #b88b62);

    cursor:pointer;

    overflow:hidden;

    box-shadow:
    0 20px 35px rgba(0,0,0,0.45),
    inset 0 0 30px rgba(255,255,255,0.08);

    transition:0.4s;
}

.scroll:hover{
    transform:translateY(-5px);
}

.scroll::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 7px
    );
}

.roll{
    position:absolute;
    top:0;

    width:100px;
    height:150px;

    border-radius:50%;

    background:
    linear-gradient(to bottom, #9f734f, #7d5639);

    box-shadow:inset 0 0 20px rgba(0,0,0,0.25);
}

.roll.left{
    left:-35px;
}

.roll.right{
    right:-35px;
}

.ribbon{
    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    width:95px;
    height:170px;

    background:
    linear-gradient(to bottom, #7a1f2f, #5e1220);

    border-radius:8px;

    box-shadow:0 0 12px rgba(0,0,0,0.3);
}

.ribbon::before{
    content:"🎀";
    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    font-size:58px;
}

/* letter */

.letter{
    width:560px;
    max-height:82vh;

    overflow:auto;

    background:
    linear-gradient(to bottom, #d8b48c, #c09267);

    color:#3d281b;

    padding:60px;

    border-radius:4px;

    text-align:left;

    line-height:2;

    font-size:22px;

    position:relative;

    box-shadow:
    0 30px 60px rgba(0,0,0,0.45),
    inset 0 0 50px rgba(255,255,255,0.08);

    animation:letterFloat 4s ease-in-out infinite alternate;
}

@keyframes letterFloat{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-8px);
    }
}

/* paper texture */

.letter::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);

    background-size:12px 12px;
    background-position:0 0, 6px 6px;

    pointer-events:none;
}

/* realistic edges */

.letter::after{
    content:"";
    position:absolute;
    inset:0;

    border:16px solid transparent;

    border-image:
    url("https://i.ibb.co/Gtxh6nH/paper-edge.png") 30 round;

    opacity:0.4;

    pointer-events:none;
}

.letter::-webkit-scrollbar{
    width:6px;
}

.letter::-webkit-scrollbar-thumb{
    background:#7a4c31;
    border-radius:10px;
}

.next-btn{
    margin-top:28px;

    padding:14px 34px;

    border:none;
    border-radius:40px;

    background:linear-gradient(to right, #8d4a3c, #6b3429);

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;

    font-family:'Cormorant Garamond', serif;

    letter-spacing:1px;

    box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.next-btn:hover{
    transform:translateY(-3px);
}

/* bouquet */

.bouquet-wrap{
    position:relative;
    animation:fadeIn 1.2s ease;
}

.bouquet-img{
    width:470px;

    filter:
    drop-shadow(0 20px 30px rgba(0,0,0,0.45));

    animation:bouquetMove 3s ease-in-out infinite alternate;
}

@keyframes bouquetMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-10px);
    }
}

.card{
    position:absolute;
    bottom:55px;
    left:50%;

    transform:translateX(-50%);

    width:200px;

    background:#efe0cb;

    color:#3f291d;

    padding:20px;

    border-radius:8px;

    cursor:pointer;

    font-size:22px;

    box-shadow:0 12px 25px rgba(0,0,0,0.35);

    animation:swing 2s ease-in-out infinite alternate;
}

@keyframes swing{

    from{
        transform:translateX(-50%) rotate(-3deg);
    }

    to{
        transform:translateX(-50%) rotate(3deg);
    }
}

.open-card{
    width:420px;

    background:#efe0cb;

    color:#3f291d;

    padding:50px;

    border-radius:8px;

    line-height:2;

    font-size:28px;

    box-shadow:0 20px 35px rgba(0,0,0,0.4);

    animation:fadeIn 1s ease;
}

/* final */

.final-box{
    animation:fadeIn 1.5s ease;
}

.couple{
    font-size:90px;
    animation:softHug 2s ease-in-out infinite alternate;
}

@keyframes softHug{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.04);
    }
}

.final-text{
    margin-top:20px;

    font-size:34px;

    max-width:540px;

    line-height:1.7;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="container" id="page1">

    <div class="main-title">
        For Deb ❤️
    </div>

    <div class="envelope-wrap">

        <div class="envelope" onclick="openPage2()">

            <div class="envelope-base">

                <div class="fold-left"></div>
                <div class="fold-right"></div>

                <div class="paper-noise"></div>

            </div>

            <div class="top-flap"></div>

            <div class="seal">
                <span>♡</span>
            </div>

        </div>

    </div>

    <div class="tap-text">
        Tap the envelope 💌
    </div>

</div>

<!-- PAGE 2 -->

<div class="container hidden" id="page2">

    <div class="scroll" onclick="openPage3()">

        <div class="roll left"></div>
        <div class="roll right"></div>

        <div class="ribbon"></div>

    </div>

    <div class="tap-text">
        Touch the ribbon 🎀
    </div>

</div>

<!-- PAGE 3 -->

<div class="container hidden" id="page3">

    <div class="letter" id="letterText"></div>

    <button class="next-btn" onclick="openBouquet()">
        Next →
    </button>

</div>

<!-- PAGE 4 -->

<div class="container hidden" id="page4">

    <div class="bouquet-wrap" id="bouquetWrap">

        <img
        class="bouquet-img"
        src="https://i.ibb.co/nwQJ4dW/real-bouquet.png"
        alt="bouquet">

        <div class="card" onclick="openCard()">
            Tap the card 💌
        </div>

    </div>

    <div class="hidden" id="cardSection">

        <div class="open-card">

            Not everyone feels like magic
            but you do ❤️

            <br><br>

            A little bouquet for someone
            who means a lot ....

            <br><br>

            I LOVE YOU ❤️

        </div>

        <button class="next-btn" onclick="openFinal()">
            Next →
        </button>

    </div>

</div>

<!-- PAGE 5 -->

<div class="container hidden" id="page5">

    <div class="final-box">

        <div class="couple">
            🫂
        </div>

        <div class="final-text">
            sending you all hugs and kisses and love ❤️
        </div>

    </div>

</div>

<!-- MUSIC -->

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const text = `Hiii love ❤️,

Deb… I don’t know how, but the way I feel for you is really different 🥺💕
It’s something new for me… something I’ve honestly never felt like this before…

Being with you just makes everything feel better.
Even the smallest things feel special when it’s you… ❤️

I really love our calls… especially when you stay awake just to talk to me 🥺
And when you fall asleep on call, it feels so peaceful… like everything is just right 🤍

I love talking to you, I love listening to you, I love being with you ❤️
Sometimes I catch myself smiling for no reason… and then I realize it’s because of you 💕

I miss you waking me up…
I miss our late night calls…
but somehow we still manage everything, and that makes it even more special 🥺

I know the time coming ahead might be a little difficult…
but I’ll manage ❤️
and you will too, I know you will…

Even when you’re not around,
I’ll still share every little detail of my day with you,
and I’ll keep telling you how much I miss you…

Because I know… I’m really going to miss you 🥺

But it’s okay…
I think I’ve gotten used to you now ❤️

It’s just been a month… but it already feels really special having you in my life…

I don’t know where this will go…
but right now, I’m really happy that it’s you ❤️

I really, really like you 💕`;

/* pages */

function openPage2(){

    document.getElementById("page1").style.display="none";

    document.getElementById("page2")
    .classList.remove("hidden");

    document.getElementById("music").play();

    sparkles();
}

function openPage3(){

    document.getElementById("page2")
    .classList.add("hidden");

    document.getElementById("page3")
    .classList.remove("hidden");

    typeWriter();
}

function openBouquet(){

    document.getElementById("page3")
    .classList.add("hidden");

    document.getElementById("page4")
    .classList.remove("hidden");
}

function openCard(){

    document.getElementById("bouquetWrap")
    .classList.add("hidden");

    document.getElementById("cardSection")
    .classList.remove("hidden");
}

function openFinal(){

    document.getElementById("page4")
    .classList.add("hidden");

    document.getElementById("page5")
    .classList.remove("hidden");
}

/* typing */

let i = 0;

function typeWriter(){

    if(i < text.length){

        document.getElementById("letterText")
        .innerHTML += text.charAt(i);

        i++;

        setTimeout(typeWriter, 24);
    }
}

/* sparkles */

function sparkles(){

    setInterval(()=>{

        let sparkle=document.createElement("div");

        sparkle.className="sparkle";

        sparkle.innerHTML="♥";

        sparkle.style.left=Math.random()*100+"vw";

        sparkle.style.fontSize=
        (10 + Math.random()*18)+"px";

        sparkle.style.animationDuration=
        (4 + Math.random()*4)+"s";

        document.body.appendChild(sparkle);

        setTimeout(()=>{
            sparkle.remove();
        },8000);

    },350);
}

</script>

</body>
</html>
```
