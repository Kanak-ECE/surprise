<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Deb ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #0d0d0d;
  color: #fff;
  text-align: center;
  overflow-x: hidden;
}

/* Center */
.container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Envelope */
.envelope {
  width: 220px;
  height: 150px;
  background: #fff;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: transform 0.5s;
}
.envelope:hover {
  transform: scale(1.05);
}

.envelope:before {
  content: "";
  position: absolute;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-top: 75px solid #ff4b5c;
  top: 0;
}

.envelope:after {
  content: "💌";
  position: absolute;
  font-size: 28px;
  bottom: 10px;
  right: 10px;
}

/* Hidden */
.hidden { display: none; }

/* Letter */
.letter {
  background: #f5e6c8;
  color: #3e2f1c;
  padding: 25px;
  border-radius: 10px;
  max-width: 350px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  text-align: left;
  font-size: 16px;
  line-height: 1.6;
  white-space: pre-line;
  animation: zoom 20s ease-in-out infinite alternate;
}

/* slow zoom */
@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

/* Photos */
.photos {
  margin-top: 25px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.photos img {
  width: 130px;
  height: 130px;
  object-fit: cover;
  border-radius: 20px;
  border: 3px dashed white;
  transform: rotate(-3deg);
  transition: 0.3s;
}

.photos img:hover {
  transform: scale(1.1) rotate(0deg);
}

.photos img:nth-child(even) {
  transform: rotate(3deg);
}

/* Hearts */
.heart {
  position: fixed;
  bottom: 0;
  color: pink;
  animation: float 5s linear infinite;
}
@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Final */
.final {
  margin-top: 20px;
  font-size: 22px;
}
</style>
</head>

<body>

<!-- Page 1 -->
<div class="container" id="page1">
  <h2>For Deb ❤️</h2>
  <div class="envelope" onclick="openLetter()"></div>
  <p>Tap the envelope 💌</p>
</div>

<!-- Page 2 -->
<div class="container hidden" id="page2">

  <div class="letter" id="letterText"></div>

  
<button onclick="showBouquet()" style="
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4b5c;
  color:white;
  font-size:16px;
  cursor:pointer;">
  Tap here 💖
</button>

<div id="bouquetPage" class="hidden" style="margin-top:30px; text-align:center;">
<!-- Page 3 -->
<div class="container hidden" id="page3">

  <h2>One more thing ❤️</h2>
  <p>Tap below for a surprise 💐</p>

  <button onclick="showBouquet3()" style="
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4b5c;
    color:white;
    font-size:16px;
    cursor:pointer;
  ">
    Open Surprise 💐
  </button>

  <!-- BIG BOUQUET OVERLAY -->
  <div id="bouquetOverlay3" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.88);
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    z-index:999;
  ">

    <h2 style="color:white;">A special bouquet just for you 💐❤️</h2>

    <img src="https://images.unsplash.com/photo-1582794543139-8ac9cb0f7b11?auto=format&fit=crop&w=700"
         style="width:75%; max-width:420px; border-radius:20px; margin-top:20px; box-shadow:0 0 35px pink;">

    <p style="color:white; margin-top:15px;">
      You mean a lot 💕
    </p>

    <button onclick="closeBouquet3()" style="
      margin-top:20px;
      padding:10px 20px;
      border:none;
      border-radius:20px;
      background:white;
      color:black;
      cursor:pointer;
    ">
      Close ✨
    </button>

  </div>

</div>
  <h2>Sending you this virtual bouquet 💐</h2>
  <p>and lots of hugs and kisses 🤗❤️</p>

  <img src="https://images.unsplash.com/photo-1582794543139-8ac9cb0f7b11"
       style="width:220px; border-radius:15px; margin-top:15px;">
</div>
  <!-- 🎶 MUSIC -->
  <audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

</div>

<script>
const text = `Hiii love ❤️,

Deb… I don’t know how, but the way I feel for you is really different 🥺💕  
It’s something new for me… something I’ve honestly never felt like this before…

Being with you just makes everything feel better.  
Even the smallest things feel special when it’s you… ❤️

I really love our calls… especially when you stay awake just to talk to me 🥺  
And when you fall asleep on call, it feels so peaceful… like everything is just right 🤍

I love talking to you, I love listening to you, I love being with you ❤️  
Sometimes I catch myself smiling for no reason… and then I realize it’s because of you 💕

I miss you waking me up…  
I miss our late night calls…  
but somehow we still manage everything, and that makes it even more special 🥺

I know the time coming ahead might be a little difficult…  
but I’ll manage ❤️  
and you will too, I know you will…

Even when you’re not around,  
I’ll still share every little detail of my day with you,  
and I’ll keep telling you how much I miss you…

Because I know… I’m really going to miss you 🥺

But it’s okay…  
I think I’ve gotten used to you now ❤️

It’s just been a month… but it already feels really special having you in my life…

I don’t know where this will go…  
but right now, I’m really happy that it’s you ❤️

I really, really like you 💕`;
function openLetter() {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").classList.remove("hidden");
  typeWriter();
  hearts();
  document.getElementById("music").play();
}

// typing
let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("letterText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}

// hearts
function hearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random()*20) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
<script>
function openLetter() {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").classList.remove("hidden");
  typeWriter();
  hearts();
}

function showBouquet() {
  document.getElementById("bouquetPage").classList.remove("hidden");
}
</script>
</body>
</html>
