<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Deb ❤️</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0d0d0d;
    font-family:'Georgia', serif;
    overflow:hidden;
    color:white;
}

/* common */

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:relative;
    padding:20px;
    text-align:center;
}

.hidden{
    display:none;
}

/* heading */

.title{
    font-size:52px;
    margin-bottom:40px;
    animation:fadeGlow 2s ease infinite alternate;
}

@keyframes fadeGlow{
    from{
        opacity:0.8;
        text-shadow:0 0 10px rgba(255,255,255,0.2);
    }

    to{
        opacity:1;
        text-shadow:0 0 20px rgba(255,255,255,0.6);
    }
}

/* ENVELOPE */

.envelope{
    width:340px;
    height:230px;
    background:#fff;
    border-radius:14px;
    position:relative;
    cursor:pointer;
    box-shadow:0 12px 40px rgba(0,0,0,0.5);
    transition:0.4s;
}

.envelope:hover{
    transform:scale(1.03);
}

/* upper flap */

.envelope:before{
    content:"";
    position:absolute;
    top:0;
    left:0;

    width:0;
    height:0;

    border-left:170px solid transparent;
    border-right:170px solid transparent;
    border-top:120px solid #8b4a3f;

    z-index:2;
}

/* bottom folds */

.envelope:after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;

    width:0;
    height:0;

    border-left:170px solid #fafafa;
    border-right:170px solid #fafafa;
    border-top:110px solid transparent;

    z-index:1;
}

/* wax seal */

.seal{
    position:absolute;
    top:85px;
    left:50%;
    transform:translateX(-50%);

    width:60px;
    height:60px;

    background:white;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#8b4a3f;
    font-size:28px;

    z-index:5;

    box-shadow:0 4px 15px rgba(0,0,0,0.25);
}

/* rabbit */

.rabbit{
    position:absolute;
    top:-40px;
    left:-90px;

    font-size:65px;

    animation:bunnyJump 2.5s ease-in-out infinite;

    z-index:10;
}

@keyframes bunnyJump{

    0%{
        transform:translateX(-80px) translateY(30px);
        opacity:0;
    }

    40%{
        transform:translateX(80px) translateY(-60px);
        opacity:1;
    }

    70%{
        transform:translateX(180px) translateY(0px);
        opacity:1;
    }

    100%{
        transform:translateX(260px) translateY(30px);
        opacity:0;
    }
}

/* tap text */

.tap{
    margin-top:25px;
    font-size:20px;
    color:#ddd;
}

/* FOLDED LETTER */

.folded-letter{
    width:320px;
    height:220px;
    background:#d8b38a;
    position:relative;

    border-radius:14px;

    overflow:hidden;

    cursor:pointer;

    box-shadow:0 10px 35px rgba(0,0,0,0.45);

    transition:0.4s;
}

.folded-letter:hover{
    transform:scale(1.03);
}

/* paper texture */

.folded-letter::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.08) 1px, transparent 1px);

    background-size:12px 12px;
    background-position:0 0, 6px 6px;
}

/* ribbon */

.ribbon{
    position:absolute;
    background:#8b4a3f;
    z-index:2;
}

.vertical{
    width:50px;
    height:100%;
    left:50%;
    transform:translateX(-50%);
}

.horizontal{
    width:100%;
    height:50px;
    top:50%;
    transform:translateY(-50%);
}

/* bow */

.bow{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:52px;
    z-index:5;
}

/* mini heart */

.mini-heart{
    position:absolute;
    bottom:15px;
    right:20px;
    font-size:22px;
    color:#8b4a3f;
}

/* letter */

.letter{
    background:#d8b38a;
    color:#3e2a1d;

    padding:30px;
    border-radius:14px;

    max-width:420px;

    line-height:1.8;
    font-size:17px;

    white-space:pre-line;

    box-shadow:0 12px 35px rgba(0,0,0,0.5);

    background-image:
    radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.08) 1px, transparent 1px);

    background-size:12px 12px;
    background-position:0 0, 6px 6px;

    animation:paperFloat 4s ease-in-out infinite alternate;
}

@keyframes paperFloat{
    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(-8px);
    }
}

/* button */

.btn{
    margin-top:25px;

    border:none;

    padding:12px 24px;

    border-radius:30px;

    background:#8b4a3f;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:0.3s;
}

.btn:hover{
    transform:scale(1.06);
}

/* bouquet */

.big-bouquet{
    font-size:120px;
    animation:bouquetPop 1.5s ease;
}

@keyframes bouquetPop{
    0%{
        transform:scale(0);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

/* card */

.card{
    margin-top:-15px;

    background:#f5e6c8;
    color:#3e2a1d;

    padding:15px 25px;

    border-radius:12px;

    font-size:22px;

    cursor:pointer;

    animation:swing 2s ease-in-out infinite alternate;
}

@keyframes swing{
    from{
        transform:rotate(-3deg);
    }

    to{
        transform:rotate(3deg);
    }
}

/* couple */

.couple-box{
    animation:fadeIn 1.5s ease;
}

.couple{
    font-size:120px;
    animation:hugMove 2s ease-in-out infinite alternate;
}

@keyframes hugMove{
    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }
}

.hug-text{
    margin-top:20px;
    font-size:24px;
    max-width:380px;
    line-height:1.5;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* floating hearts */

.heart{
    position:fixed;
    bottom:0;
    color:pink;
    animation:float 5s linear infinite;
    z-index:999;
}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="container" id="page1">

    <div class="title">
        For Deb ❤️
    </div>

    <div class="envelope" onclick="openLetterPage()">

        <div class="seal">♡</div>

        <div class="rabbit">🐇</div>

    </div>

    <div class="tap">
        Tap the envelope 💌
    </div>

</div>

<!-- PAGE 2 -->

<div class="container hidden" id="page2">

    <div class="folded-letter" onclick="openMainLetter()">

        <div class="ribbon vertical"></div>

        <div class="ribbon horizontal"></div>

        <div class="bow">🎀</div>

        <div class="mini-heart">♡</div>

    </div>

    <div class="tap">
        Touch the ribbon 🎀
    </div>

</div>

<!-- PAGE 3 -->

<div class="container hidden" id="page3">

    <div class="letter" id="letterText"></div>

    <button class="btn" onclick="goToBouquet()">
        Next ➝
    </button>

</div>

<!-- PAGE 4 -->

<div class="container hidden" id="page4">

    <!-- bouquet -->

    <div id="bouquetSection">

        <div class="big-bouquet">
            💐🌷🌸
        </div>

        <div class="card" onclick="openCouple()">
            chit chat when 🤍
        </div>

    </div>

    <!-- hugs -->

    <div class="couple-box hidden" id="coupleSection">

        <div class="couple">
            🫂💋
        </div>

        <div class="hug-text">
            these virtual hugs and kisses for you ❤️
        </div>

    </div>

</div>

<!-- MUSIC -->

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const text = `Hiii love ❤️,

Deb… I don’t know how, but the way I feel for you is really different 🥺💕  
It’s something new for me… something I’ve honestly never felt like this before…

Being with you just makes everything feel better.  
Even the smallest things feel special when it’s you… ❤️

I really love our calls… especially when you stay awake just to talk to me 🥺  
And when you fall asleep on call, it feels so peaceful… like everything is just right 🤍

I love talking to you, I love listening to you, I love being with you ❤️  
Sometimes I catch myself smiling for no reason… and then I realize it’s because of you 💕

I miss you waking me up…  
I miss our late night calls…  
but somehow we still manage everything, and that makes it even more special 🥺

I know the time coming ahead might be a little difficult…  
but I’ll manage ❤️  
and you will too, I know you will…

Even when you’re not around,  
I’ll still share every little detail of my day with you,  
and I’ll keep telling you how much I miss you…

Because I know… I’m really going to miss you 🥺

But it’s okay…  
I think I’ve gotten used to you now ❤️

It’s just been a month… but it already feels really special having you in my life…

I don’t know where this will go…  
but right now, I’m really happy that it’s you ❤️

I really, really like you 💕`;



/* page changes */

function openLetterPage(){

    document.getElementById("page1").style.display="none";

    document.getElementById("page2")
    .classList.remove("hidden");

    hearts();

    document.getElementById("music").play();

}



function openMainLetter(){

    document.getElementById("page2")
    .classList.add("hidden");

    document.getElementById("page3")
    .classList.remove("hidden");

    typeWriter();

}



/* typing effect */

let i = 0;

function typeWriter(){

    if(i < text.length){

        document.getElementById("letterText")
        .innerHTML += text.charAt(i);

        i++;

        setTimeout(typeWriter, 25);
    }
}



/* bouquet page */

function goToBouquet(){

    document.getElementById("page3")
    .classList.add("hidden");

    document.getElementById("page4")
    .classList.remove("hidden");

}



/* open hugs */

function openCouple(){

    document.getElementById("bouquetSection")
    .style.display="none";

    document.getElementById("coupleSection")
    .classList.remove("hidden");

}



/* hearts */

function hearts(){

    setInterval(()=>{

        let heart=document.createElement("div");

        heart.className="heart";

        heart.innerHTML="💖";

        heart.style.left=Math.random()*100+"vw";

        heart.style.fontSize=
        (10 + Math.random()*25)+"px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },5000);

    },300);

}

</script>

</body>
</html>
