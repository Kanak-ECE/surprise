<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Deb ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #0d0d0d;
  color: #fff;
  text-align: center;
  overflow-x: hidden;
}

/* Center */
.container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Envelope */
.envelope {
  width: 220px;
  height: 150px;
  background: #fff;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: transform 0.5s;
}
.envelope:hover {
  transform: scale(1.05);
}

.envelope:before {
  content: "";
  position: absolute;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-top: 75px solid #ff4b5c;
  top: 0;
}

.envelope:after {
  content: "💌";
  position: absolute;
  font-size: 28px;
  bottom: 10px;
  right: 10px;
}

/* Hidden */
.hidden { display: none; }

/* Letter */
.letter {
  background: #f5e6c8;
  color: #3e2f1c;
  padding: 25px;
  border-radius: 10px;
  max-width: 350px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  text-align: left;
  font-size: 16px;
  line-height: 1.6;
  white-space: pre-line;
  animation: zoom 20s ease-in-out infinite alternate;
}

/* slow zoom */
@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

/* Photos */
.photos {
  margin-top: 25px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.photos img {
  width: 130px;
  height: 130px;
  object-fit: cover;
  border-radius: 20px;
  border: 3px dashed white;
  transform: rotate(-3deg);
  transition: 0.3s;
}

.photos img:hover {
  transform: scale(1.1) rotate(0deg);
}

.photos img:nth-child(even) {
  transform: rotate(3deg);
}

/* Hearts */
.heart {
  position: fixed;
  bottom: 0;
  color: pink;
  animation: float 5s linear infinite;
}
@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Final */
.final {
  margin-top: 20px;
  font-size: 22px;
}
</style>
</head>

<body>

<!-- Page 1 -->
<div class="container" id="page1">
  <h2>For Deb ❤️</h2>
  <div class="envelope" onclick="openLetter()"></div>
  <p>Tap the envelope 💌</p>
</div>

<!-- Page 2 -->
<div class="container hidden" id="page2">

  <div class="letter" id="letterText"></div>

  <div class="photos">
  <img src="https://i.ibb.co/Q3pjjjGF/IMG-20260426-WA0025.jpg" alt="photo1">
  <img src="https://i.ibb.co/b5QT6xVX/Screenshot-20260506-005057-Whats-App.jpg" alt="photo2">
  <img src="https://i.ibb.co/ycmXHrvP/IMG-20260414-WA0075.jpg" alt="photo3">
  <img src="https://i.ibb.co/yDNsJjW/IMG-20260502-WA0006.jpg" alt="photo4">
  <img src="https://i.ibb.co/GQRSDWFq/IMG-20260408-WA0006.jpg" alt="photo5">
  <img src="https://i.ibb.co/8nCWmR4G/IMG-20260410-WA0073.jpg" alt="photo6">
  <img src="https://i.ibb.co/4RW5YxGM/Snapchat-777868539.jpg" alt="photo7">
  <img src="https://i.ibb.co/Y4YRcmj9/Snapchat-2068278127.jpg" alt="photo8">

  </div>

  <div class="final">I LIKE ME BETTER WITH YOU ❤️</div>

  <!-- 🎶 MUSIC -->
  <audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

</div>

<script>
const text = `Hiii love ❤️,

Deb… I don’t know how, but the way I feel for you is really different 🥺💕  
It’s something new for me… something I’ve honestly never felt like this before…

Being with you just makes everything feel better.  
Even the smallest things feel special when it’s you… ❤️

I really love our calls… especially when you stay awake just to talk to me 🥺  
And when you fall asleep on call, it feels so peaceful… like everything is just right 🤍

I love talking to you, I love listening to you, I love being with you ❤️  
Sometimes I catch myself smiling for no reason… and then I realize it’s because of you 💕

I miss you waking me up…  
I miss our late night calls…  
but somehow we still manage everything, and that makes it even more special 🥺

I know the time coming ahead might be a little difficult…  
but I’ll manage ❤️  
and you will too, I know you will…

Even when you’re not around,  
I’ll still share every little detail of my day with you,  
and I’ll keep telling you how much I miss you…

Because I know… I’m really going to miss you 🥺

But it’s okay…  
I think I’ve gotten used to you now ❤️

It’s just been a month… but it already feels really special having you in my life…

I don’t know where this will go…  
but right now, I’m really happy that it’s you ❤️

I really, really like you 💕`;
function openLetter() {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").classList.remove("hidden");
  typeWriter();
  hearts();
  document.getElementById("music").play();
}

// typing
let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("letterText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 30);
  }
}

// hearts
function hearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random()*20) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>
