<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Deb ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    overflow:hidden;
    font-family:'Georgia', serif;
    color:white;
}

/* COMMON */

.container{
    min-height:100vh;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:relative;
    padding:20px;
    text-align:center;
}

.hidden{
    display:none;
}

/* BACKGROUND GLOW */

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top, rgba(255,80,80,0.15), transparent 40%),
    radial-gradient(circle at bottom, rgba(255,255,255,0.05), transparent 40%);

    pointer-events:none;
}

/* FLOATING HEARTS */

.heart{
    position:fixed;
    bottom:0;
    color:#ff8fb1;
    animation:float 5s linear infinite;
    z-index:999;
}

@keyframes float{

    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}

/* TITLE */

.title{
    font-size:58px;
    margin-bottom:40px;
    animation:glow 2s ease infinite alternate;
}

@keyframes glow{

    from{
        text-shadow:0 0 10px rgba(255,255,255,0.2);
    }

    to{
        text-shadow:0 0 25px rgba(255,255,255,0.7);
    }
}

/* ENVELOPE */

.envelope{
    width:360px;
    height:240px;
    background:#fffdf9;
    position:relative;
    border-radius:12px;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 10px 35px rgba(0,0,0,0.5);
}

.envelope:hover{
    transform:scale(1.03);
}

/* TOP FLAP */

.envelope::before{
    content:"";
    position:absolute;
    top:0;
    left:0;

    width:0;
    height:0;

    border-left:180px solid transparent;
    border-right:180px solid transparent;
    border-top:125px solid #8b4a3f;

    z-index:2;
}

/* LOWER FOLD */

.envelope::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;

    width:0;
    height:0;

    border-left:180px solid #fffdf9;
    border-right:180px solid #fffdf9;
    border-top:120px solid transparent;
}

/* SEAL */

.seal{
    position:absolute;
    top:88px;
    left:50%;
    transform:translateX(-50%);

    width:62px;
    height:62px;

    background:white;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:28px;
    color:#8b4a3f;

    z-index:5;

    box-shadow:0 5px 12px rgba(0,0,0,0.25);
}

/* TAP TEXT */

.tap{
    margin-top:25px;
    font-size:20px;
    color:#ddd;
}

/* ROLLED LETTER */

.rolled-letter{
    width:360px;
    height:120px;

    background:#b98d68;

    border-radius:60px;

    position:relative;

    overflow:hidden;

    cursor:pointer;

    transition:0.4s;

    box-shadow:0 10px 35px rgba(0,0,0,0.45);
}

.rolled-letter:hover{
    transform:scale(1.03);
}

/* CRACKY TEXTURE */

.rolled-letter::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 6px
    );

    opacity:0.5;
}

/* ROLLED SIDES */

.roll-left,
.roll-right{
    position:absolute;
    top:0;
    width:65px;
    height:120px;

    background:#9c7454;

    border-radius:50%;
}

.roll-left{
    left:-20px;
}

.roll-right{
    right:-20px;
}

/* CRACKY EDGES */

.crack{
    position:absolute;
    width:100%;
    height:10px;
    background:
    repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 5px,
    rgba(0,0,0,0.15) 5px,
    rgba(0,0,0,0.15) 8px
    );
}

.top-crack{
    top:0;
}

.bottom-crack{
    bottom:0;
}

/* RIBBON */

.ribbon{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);

    width:100px;
    height:130px;

    background:#7b1f2b;

    border-radius:8px;
}

.ribbon::before{
    content:"🎀";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:55px;
}

/* MAIN LETTER */

.letter{
    width:430px;
    max-height:78vh;

    overflow:auto;

    background:#c79c72;

    color:#3b2417;

    padding:35px;

    border-radius:8px;

    line-height:1.9;

    font-size:17px;

    text-align:left;

    white-space:pre-line;

    box-shadow:0 10px 40px rgba(0,0,0,0.55);

    position:relative;

    animation:paperFloat 4s ease-in-out infinite alternate;
}

/* PAPER TEXTURE */

.letter::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);

    background-size:14px 14px;
    background-position:0 0, 7px 7px;

    pointer-events:none;
}

/* CRACKY EDGES */

.letter::after{
    content:"";
    position:absolute;
    inset:0;

    border:10px solid transparent;

    border-image:
    repeating-linear-gradient(
    45deg,
    rgba(90,50,30,0.5) 0px,
    rgba(90,50,30,0.5) 3px,
    transparent 3px,
    transparent 8px
    ) 10;

    pointer-events:none;
}

@keyframes paperFloat{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-8px);
    }
}

/* BUTTON */

.btn{
    margin-top:25px;

    border:none;

    padding:14px 30px;

    border-radius:30px;

    background:#8b4a3f;

    color:white;

    font-size:17px;

    cursor:pointer;

    transition:0.3s;

    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.btn:hover{
    transform:scale(1.05);
}

/* BOUQUET */

.bouquet-wrap{
    position:relative;
    animation:fadeIn 1.5s ease;
}

.bouquet{
    width:360px;
    animation:bouquetMove 3s ease-in-out infinite alternate;
    filter:drop-shadow(0 0 15px rgba(255,0,80,0.2));
}

@keyframes bouquetMove{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-10px);
    }
}

/* CARD */

.hang-card{
    position:absolute;
    bottom:60px;
    left:50%;

    transform:translateX(-50%);

    width:180px;

    background:#f2dcc2;

    color:#3d2418;

    padding:18px;

    border-radius:8px;

    cursor:pointer;

    font-size:20px;

    line-height:1.5;

    box-shadow:0 5px 15px rgba(0,0,0,0.35);

    animation:swing 2s ease-in-out infinite alternate;
}

@keyframes swing{

    from{
        transform:translateX(-50%) rotate(-3deg);
    }

    to{
        transform:translateX(-50%) rotate(3deg);
    }
}

/* OPEN CARD */

.open-card{
    width:320px;

    background:#f2dcc2;

    color:#3d2418;

    padding:35px;

    border-radius:10px;

    line-height:1.9;

    font-size:24px;

    animation:fadeIn 1s ease;

    box-shadow:0 10px 35px rgba(0,0,0,0.45);
}

/* HUG SECTION */

.hug-section{
    animation:fadeIn 1.5s ease;
}

.couple{
    font-size:95px;
    animation:hug 2s ease-in-out infinite alternate;
}

@keyframes hug{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.05);
    }
}

.hug-text{
    margin-top:18px;
    font-size:26px;
    max-width:420px;
    line-height:1.6;
}

/* FADE */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="container" id="page1">

    <div class="title">
        For Deb ❤️
    </div>

    <div class="envelope" onclick="openPage2()">

        <div class="seal">♡</div>

    </div>

    <div class="tap">
        Tap the envelope 💌
    </div>

</div>

<!-- PAGE 2 -->

<div class="container hidden" id="page2">

    <div class="rolled-letter" onclick="openPage3()">

        <div class="roll-left"></div>

        <div class="roll-right"></div>

        <div class="crack top-crack"></div>

        <div class="crack bottom-crack"></div>

        <div class="ribbon"></div>

    </div>

    <div class="tap">
        Touch the ribbon 🎀
    </div>

</div>

<!-- PAGE 3 -->

<div class="container hidden" id="page3">

    <div class="letter" id="letterText"></div>

    <button class="btn" onclick="openBouquet()">
        Next →
    </button>

</div>

<!-- PAGE 4 -->

<div class="container hidden" id="page4">

    <!-- bouquet -->

    <div class="bouquet-wrap" id="bouquetWrap">

        <img 
        class="bouquet"
        src="https://i.ibb.co/9m7K4jL/bouquet.png"
        alt="bouquet">

        <div class="hang-card" onclick="openCard()">
            Tap the card 💌
        </div>

    </div>

    <!-- open card -->

    <div class="hidden" id="cardSection">

        <div class="open-card">

            Not everyone feels like magic  
            but you do ❤️

            <br><br>

            A little bouquet for someone  
            who means a lot ....

            <br><br>

            I LOVE YOU ❤️

        </div>

        <button class="btn" onclick="openHugs()">
            Next →
        </button>

    </div>

</div>

<!-- PAGE 5 -->

<div class="container hidden" id="page5">

    <div class="hug-section">

        <div class="couple">
            🫂
        </div>

        <div class="hug-text">
            sending you all hugs and kisses and love ❤️
        </div>

    </div>

</div>

<!-- MUSIC -->

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const text = `Hiii love ❤️,

Deb… I don’t know how, but the way I feel for you is really different 🥺💕  
It’s something new for me… something I’ve honestly never felt like this before…

Being with you just makes everything feel better.  
Even the smallest things feel special when it’s you… ❤️

I really love our calls… especially when you stay awake just to talk to me 🥺  
And when you fall asleep on call, it feels so peaceful… like everything is just right 🤍

I love talking to you, I love listening to you, I love being with you ❤️  
Sometimes I catch myself smiling for no reason… and then I realize it’s because of you 💕

I miss you waking me up…  
I miss our late night calls…  
but somehow we still manage everything, and that makes it even more special 🥺

I know the time coming ahead might be a little difficult…  
but I’ll manage ❤️  
and you will too, I know you will…

Even when you’re not around,  
I’ll still share every little detail of my day with you,  
and I’ll keep telling you how much I miss you…

Because I know… I’m really going to miss you 🥺

But it’s okay…  
I think I’ve gotten used to you now ❤️

It’s just been a month… but it already feels really special having you in my life…

I don’t know where this will go…  
but right now, I’m really happy that it’s you ❤️

I really, really like you 💕`;


/* PAGE CHANGES */

function openPage2(){

    document.getElementById("page1").style.display="none";

    document.getElementById("page2")
    .classList.remove("hidden");

    hearts();

    document.getElementById("music").play();
}

function openPage3(){

    document.getElementById("page2")
    .classList.add("hidden");

    document.getElementById("page3")
    .classList.remove("hidden");

    typeWriter();
}

function openBouquet(){

    document.getElementById("page3")
    .classList.add("hidden");

    document.getElementById("page4")
    .classList.remove("hidden");
}

function openCard(){

    document.getElementById("bouquetWrap")
    .classList.add("hidden");

    document.getElementById("cardSection")
    .classList.remove("hidden");
}

function openHugs(){

    document.getElementById("page4")
    .classList.add("hidden");

    document.getElementById("page5")
    .classList.remove("hidden");
}

/* TYPEWRITER */

let i = 0;

function typeWriter(){

    if(i < text.length){

        document.getElementById("letterText")
        .innerHTML += text.charAt(i);

        i++;

        setTimeout(typeWriter, 25);
    }
}

/* HEARTS */

function hearts(){

    setInterval(()=>{

        let heart=document.createElement("div");

        heart.className="heart";

        heart.innerHTML="💖";

        heart.style.left=Math.random()*100+"vw";

        heart.style.fontSize=
        (10 + Math.random()*20)+"px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },5000);

    },300);
}

</script>

</body>
</html>
