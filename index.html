<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Deb ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Envelope */
.envelope {
  width: 200px;
  height: 120px;
  background: white;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
}
.envelope:before {
  content: "";
  position: absolute;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 60px solid red;
}

/* Hidden */
.hidden { display: none; }

/* Text */
.text {
  font-size: 18px;
  opacity: 0;
  transition: 1s;
}
.show { opacity: 1; }

/* Slideshow */
.slideshow img {
  width: 240px;
  border-radius: 20px;
  position: absolute;
  opacity: 0;
  transition: 1s;
}
.active { opacity: 1 !important; }

/* Hearts */
.heart {
  position: absolute;
  color: pink;
  animation: float 5s linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* Final */
.final {
  font-size: 28px;
  margin-top: 20px;
  opacity: 0;
  transition: 1s;
}
</style>
</head>

<body>

<!-- Start -->
<div class="container" id="start">
  <h2>For Deb ❤️</h2>
  <div class="envelope" onclick="startLove()"></div>
  <p>Tap to open 💌</p>
</div>

<!-- Main -->
<div class="container hidden" id="main">

  <div id="t1" class="text">Hiii love ❤️</div>
  <div id="t2" class="text">The way I feel for you is really different 🥺💕</div>
  <div id="t3" class="text">I really like being around you ❤️</div>

  <p id="t4" class="text" style="max-width:300px;">
    It’s just been a month, but it already feels really nice having you in my life 💕<br><br>
    I really, really like you ❤️
  </p>

  <!-- Photos (abhi blank rakh rahe hain test ke liye) -->
  <div class="slideshow" style="margin-top:20px;">
    <!-- yaha baad me images daalenge -->
  </div>

  <div id="final" class="final">I LIKE ME BETTER WITH YOU ❤️</div>

</div>

<script>
function startLove() {
  document.getElementById("start").style.display = "none";
  document.getElementById("main").classList.remove("hidden");

  setTimeout(()=> show("t1"), 500);
  setTimeout(()=> show("t2"), 2500);
  setTimeout(()=> show("t3"), 4500);
  setTimeout(()=> show("t4"), 6500);
  setTimeout(()=> {
    document.getElementById("final").style.opacity = 1;
  }, 9000);

  hearts();
}

function show(id){
  document.getElementById(id).classList.add("show");
}

// hearts
function hearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random()*20) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>
